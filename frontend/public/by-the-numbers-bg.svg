<svg viewBox="0 0 2210 1230" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Blank numeric-styled background with no text or numbers</title>
<desc>A soft out of focus background made only of chart shapes: bar charts, a line graph, a pie chart, a donut progress ring, and an empty data table grid, with no text or numbers anywhere. A light page crease runs down the center.</desc>
<defs>
<filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
  <feGaussianBlur stdDeviation="6"/>
</filter>
<linearGradient id="hingeShade" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0" stop-color="#000000" stop-opacity="0"/>
  <stop offset="0.5" stop-color="#000000" stop-opacity="0.14"/>
  <stop offset="1" stop-color="#000000" stop-opacity="0"/>
</linearGradient>
</defs>

<rect x="0" y="0" width="2210" height="1230" fill="#fbfbf9"/>

<g filter="url(#softBlur)" opacity="0.42">

  <g transform="translate(420,140)">
    <line x1="0" y1="300" x2="380" y2="300" stroke="#9a9994" stroke-width="2"/>
    <rect x="20" y="200" width="40" height="100" fill="#9a9994"/>
    <rect x="80" y="150" width="40" height="150" fill="#9a9994"/>
    <rect x="140" y="90" width="40" height="210" fill="#c0322b"/>
    <rect x="200" y="170" width="40" height="130" fill="#9a9994"/>
    <rect x="260" y="60" width="40" height="240" fill="#9a9994"/>
    <rect x="320" y="120" width="40" height="180" fill="#9a9994"/>
  </g>

  <g transform="translate(420,600)" stroke="#9a9994" stroke-width="3" fill="none">
    <polyline points="0,120 60,80 120,140 180,40 240,90 300,20 360,60"/>
    <circle cx="240" cy="90" r="7" fill="#c0322b" stroke="none"/>
  </g>

  <g transform="translate(950,540)">
    <circle cx="80" cy="80" r="80" fill="none" stroke="#c2c1ba" stroke-width="22"/>
    <path d="M80 0 A80 80 0 0 1 148 118 L80 80 Z" fill="#c0322b"/>
  </g>

  <g transform="translate(1650,420)" stroke="#c2c1ba" stroke-width="2">
    <line x1="0" y1="0" x2="380" y2="0"/><line x1="0" y1="60" x2="380" y2="60"/><line x1="0" y1="120" x2="380" y2="120"/><line x1="0" y1="180" x2="380" y2="180"/>
    <line x1="0" y1="0" x2="0" y2="180"/><line x1="130" y1="0" x2="130" y2="180"/><line x1="260" y1="0" x2="260" y2="180"/><line x1="380" y1="0" x2="380" y2="180"/>
  </g>

  <g transform="translate(1650,150)">
    <rect x="0" y="90" width="35" height="60" fill="#9a9994"/>
    <rect x="50" y="60" width="35" height="90" fill="#c0322b"/>
    <rect x="100" y="110" width="35" height="40" fill="#9a9994"/>
    <rect x="150" y="30" width="35" height="120" fill="#9a9994"/>
    <line x1="-10" y1="150" x2="200" y2="150" stroke="#9a9994" stroke-width="1.5"/>
  </g>

  <g transform="translate(560,860)">
    <circle cx="60" cy="60" r="60" fill="none" stroke="#c2c1ba" stroke-width="14"/>
    <path d="M60 0 A60 60 0 1 1 6 95" fill="none" stroke="#c0322b" stroke-width="14"/>
  </g>

  <g transform="translate(150,850)" stroke="#9a9994" stroke-width="14" stroke-linecap="round">
    <line x1="0" y1="60" x2="0" y2="0"/>
    <line x1="40" y1="60" x2="40" y2="-30"/>
    <line x1="80" y1="60" x2="80" y2="-60"/>
    <line x1="120" y1="60" x2="120" y2="-15"/>
    <line x1="160" y1="60" x2="160" y2="-45"/>
  </g>

</g>

<rect x="1060" y="0" width="80" height="1230" fill="url(#hingeShade)"/>
<rect x="1099" y="0" width="3" height="1230" fill="#000000" opacity="0.28"/>
</svg>
