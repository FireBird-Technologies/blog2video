<svg viewBox="0 0 2210 1230" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Blank numeric-styled background with no text or numbers</title>
<desc>A softly defocused background made only of chart shapes: bar charts, line graphs, pie and donut progress rings, and empty data-table grids, with no text or numbers anywhere. A light page crease runs down the center.</desc>
<defs>
<filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
  <feGaussianBlur stdDeviation="0.15"/>
</filter>
<linearGradient id="hingeShade" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0" stop-color="#000000" stop-opacity="0"/>
  <stop offset="0.5" stop-color="#000000" stop-opacity="0.14"/>
  <stop offset="1" stop-color="#000000" stop-opacity="0"/>
</linearGradient>
</defs>

<rect x="0" y="0" width="2210" height="1230" fill="#fbfbf9"/>

<g filter="url(#softBlur)" opacity="0.72">

  <!-- LEFT PAGE -->

  <!-- bar chart with baseline -->
  <g transform="translate(200,160)">
    <line x1="0" y1="300" x2="380" y2="300" stroke="#7c7b76" stroke-width="3"/>
    <rect x="20" y="200" width="42" height="100" fill="#9aa2ab"/>
    <rect x="82" y="150" width="42" height="150" fill="#828a92"/>
    <rect x="144" y="90" width="42" height="210" fill="#c0322b"/>
    <rect x="206" y="170" width="42" height="130" fill="#9aa2ab"/>
    <rect x="268" y="60" width="42" height="240" fill="#d98b8b"/>
    <rect x="330" y="120" width="42" height="180" fill="#7c7b76"/>
  </g>

  <!-- line graph with peak dot -->
  <g transform="translate(680,190)" stroke="#7f868d" stroke-width="5" fill="none">
    <polyline points="0,240 90,140 180,190 270,50 360,110 450,20"/>
    <circle cx="450" cy="20" r="11" fill="#c0322b" stroke="none"/>
  </g>

  <!-- big donut progress ring -->
  <g transform="translate(230,640)">
    <circle cx="140" cy="140" r="120" fill="none" stroke="#dfe3e6" stroke-width="24"/>
    <path d="M140 20 A120 120 0 1 1 30 190" fill="none" stroke="#c0322b" stroke-width="24" stroke-linecap="round"/>
  </g>

  <!-- data-table grid -->
  <g transform="translate(620,700)" stroke="#a9a8a1" stroke-width="3">
    <line x1="0" y1="0" x2="380" y2="0"/><line x1="0" y1="90" x2="380" y2="90"/><line x1="0" y1="180" x2="380" y2="180"/><line x1="0" y1="270" x2="380" y2="270"/>
    <line x1="0" y1="0" x2="0" y2="270"/><line x1="127" y1="0" x2="127" y2="270"/><line x1="254" y1="0" x2="254" y2="270"/><line x1="380" y1="0" x2="380" y2="270"/>
    <rect x="4" y="4" width="119" height="82" fill="#c0322b" opacity="0.28" stroke="none"/>
    <rect x="258" y="184" width="118" height="82" fill="#9aa2ab" opacity="0.45" stroke="none"/>
  </g>

  <!-- pill / legend chip -->
  <g transform="translate(200,1040)">
    <rect x="0" y="0" width="360" height="70" rx="35" fill="#e7e8ea"/>
    <circle cx="40" cy="35" r="16" fill="#c0322b"/>
    <rect x="80" y="26" width="220" height="18" rx="9" fill="#9aa2ab"/>
  </g>

  <!-- RIGHT PAGE -->

  <!-- small bar cluster -->
  <g transform="translate(1360,190)">
    <rect x="0" y="90" width="40" height="120" fill="#9aa2ab"/>
    <rect x="58" y="50" width="40" height="160" fill="#c0322b"/>
    <rect x="116" y="110" width="40" height="100" fill="#9aa2ab"/>
    <rect x="174" y="20" width="40" height="190" fill="#828a92"/>
    <line x1="-12" y1="210" x2="230" y2="210" stroke="#7c7b76" stroke-width="3"/>
  </g>

  <!-- mini line graph -->
  <g transform="translate(1680,180)" stroke="#7f868d" stroke-width="4" fill="none">
    <polyline points="0,140 70,80 140,110 210,30 280,70"/>
  </g>

  <!-- half-gauge -->
  <g transform="translate(1360,520)">
    <path d="M0,140 A140,140 0 0,1 280,140" fill="none" stroke="#dfe3e6" stroke-width="28"/>
    <path d="M0,140 A140,140 0 0,1 200,20" fill="none" stroke="#7f868d" stroke-width="28" stroke-linecap="round"/>
  </g>

  <!-- pie chart -->
  <g transform="translate(1760,520)">
    <circle cx="110" cy="110" r="110" fill="#e7e8ea"/>
    <path d="M110,110 L110,0 A110,110 0 0,1 205,165 Z" fill="#9aa2ab"/>
    <path d="M110,110 L205,165 A110,110 0 0,1 40,190 Z" fill="#c0322b" opacity="0.62"/>
  </g>

  <!-- data-table grid -->
  <g transform="translate(1360,860)" stroke="#a9a8a1" stroke-width="3">
    <line x1="0" y1="0" x2="380" y2="0"/><line x1="0" y1="80" x2="380" y2="80"/><line x1="0" y1="160" x2="380" y2="160"/><line x1="0" y1="240" x2="380" y2="240"/>
    <line x1="0" y1="0" x2="0" y2="240"/><line x1="127" y1="0" x2="127" y2="240"/><line x1="254" y1="0" x2="254" y2="240"/><line x1="380" y1="0" x2="380" y2="240"/>
  </g>

  <!-- small donut ring -->
  <g transform="translate(1830,880)">
    <circle cx="90" cy="90" r="80" fill="none" stroke="#dfe3e6" stroke-width="18"/>
    <path d="M90 10 A80 80 0 1 1 22 130" fill="none" stroke="#c0322b" stroke-width="18" stroke-linecap="round"/>
  </g>

</g>

<rect x="1060" y="0" width="80" height="1230" fill="url(#hingeShade)"/>
<rect x="1099" y="0" width="3" height="1230" fill="#000000" opacity="0.28"/>
</svg>
