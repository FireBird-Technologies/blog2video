<svg width="700" height="380" viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg">
  <!-- background -->
  <rect x="0" y="0" width="700" height="380" fill="#ffffff"/>

  <!-- outer border -->
  <rect x="4" y="4" width="692" height="372" fill="none" stroke="#e6e6e6" stroke-width="1"/>

  <!-- ===================== LEFT PAGE ===================== -->
  <!-- title block -->
  <rect x="60" y="40" width="120" height="6" rx="3" fill="#d6d6d6"/>
  <rect x="60" y="54" width="80" height="4" rx="2" fill="#e6e6e6"/>

  <!-- paragraph lines -->
  <rect x="60" y="90" width="112" height="4" rx="2" fill="#ececec"/>
  <rect x="60" y="104" width="100" height="4" rx="2" fill="#ececec"/>
  <rect x="60" y="118" width="106" height="4" rx="2" fill="#ececec"/>
  <rect x="60" y="132" width="96"  height="4" rx="2" fill="#ececec"/>
  <rect x="60" y="146" width="70"  height="4" rx="2" fill="#ececec"/>

  <!-- 2x2 icon / tile grid -->
  <rect x="200" y="90"  width="46" height="46" rx="4" fill="#e8e8e8"/>
  <rect x="254" y="90"  width="46" height="46" rx="4" fill="#e8e8e8"/>
  <rect x="200" y="144" width="46" height="46" rx="4" fill="#e8e8e8"/>
  <rect x="254" y="144" width="46" height="46" rx="4" fill="#e8e8e8"/>

  <!-- large image placeholder -->
  <rect x="60" y="228" width="240" height="112" rx="4" fill="#dcdcdc"/>

  <!-- ===================== RIGHT PAGE ===================== -->
  <!-- two-column paragraph text -->
  <g fill="#ececec">
    <!-- left column -->
    <rect x="392" y="112" width="108" height="4" rx="2"/>
    <rect x="392" y="126" width="100" height="4" rx="2"/>
    <rect x="392" y="140" width="104" height="4" rx="2"/>
    <rect x="392" y="154" width="90"  height="4" rx="2"/>
    <rect x="392" y="168" width="98"  height="4" rx="2"/>
    <rect x="392" y="182" width="70"  height="4" rx="2"/>

    <!-- right column -->
    <rect x="522" y="112" width="108" height="4" rx="2"/>
    <rect x="522" y="126" width="96"  height="4" rx="2"/>
    <rect x="522" y="140" width="104" height="4" rx="2"/>
    <rect x="522" y="154" width="88"  height="4" rx="2"/>
    <rect x="522" y="168" width="100" height="4" rx="2"/>
    <rect x="522" y="182" width="60"  height="4" rx="2"/>
  </g>

  <!-- large image placeholder -->
  <rect x="450" y="228" width="190" height="112" rx="4" fill="#dcdcdc"/>
</svg>
