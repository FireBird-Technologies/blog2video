name: Frontend Checks

# Lightweight gate for the React/TS frontend, run on every PR into develop that
# touches the frontend. Two cheap checks, no unit tests / no E2E:
#   1. tsc -b   — build/TypeScript errors
#   2. eslint   — Rules of Hooks only (the one crash class tsc can't see)
# ESLint is intentionally hooks-only and silent unless a real hook bug appears.
#
# Make this a REQUIRED status check on develop (repo Settings → Branches)
# alongside Backend Tests once it's been green for a few PRs.

on:
  pull_request:
    branches: [develop]
    paths: ["frontend/**", ".github/workflows/frontend-tests.yml"]
  push:
    branches: [develop]
    paths: ["frontend/**", ".github/workflows/frontend-tests.yml"]

jobs:
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Caches ~/.npm keyed on the lockfile hash, so a clean `npm ci`
          # restores from cache in seconds when dependencies are unchanged.
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc -b)
        run: npm run typecheck

      - name: Lint (Rules of Hooks)
        run: npm run lint
