<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog2Video — Set up your video</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      padding: 14px;
      padding-bottom: 78px;
      min-height: 100vh;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #555;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin: 6px 0 10px;
    }
    .section-label:not(:first-child) { margin-top: 22px; }

    /* Templates grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .card {
      background: #141414;
      border-radius: 8px;
      overflow: hidden;
      border: 1.5px solid #222;
      cursor: pointer;
      transition: border-color .15s, transform .1s, box-shadow .15s;
      user-select: none;
    }
    .card:hover { border-color: #444; transform: translateY(-1px); }
    .card.selected { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.35); }
    .card img {
      width: 100%; aspect-ratio: 16 / 9; object-fit: cover;
      display: block; background: #1a1a1a;
    }
    .card .info { padding: 8px 10px 10px; }
    .card .info h3 {
      font-size: 12px; font-weight: 600; color: #ddd; margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card .genres {
      font-size: 10px; color: #555;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Voices list — scrollable so the Create bar stays visible no matter how
       many voices the user has saved. */
    .vgrid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
      max-height: 280px; overflow-y: auto;
      padding-right: 4px;
    }
    .vcard {
      background: #141414; border-radius: 8px; border: 1.5px solid #222;
      padding: 10px 12px; cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
      display: flex; align-items: center; gap: 10px; user-select: none;
    }
    .vcard:hover { border-color: #444; }
    .vcard.selected { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,.3); }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: #1e1e1e; border: 1px solid #333;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .vinfo { flex: 1; min-width: 0; }
    .vname {
      font-size: 12px; font-weight: 600; color: #ddd;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .vmeta { font-size: 10px; color: #555; margin-top: 2px; }
    .play-btn {
      width: 28px; height: 28px; border-radius: 50%;
      background: #1e1e1e; border: 1px solid #333; color: #888;
      font-size: 10px; cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s, border-color .15s;
    }
    .play-btn:hover { background: #252525; color: #ddd; border-color: #555; }
    .play-btn.playing { background: #1e3a5f; color: #3b82f6; border-color: #3b82f6; }

    /* Sticky create bar — `sticky` works inside iframe-auto-resized hosts
       like ChatGPT where `fixed` gets pushed off-screen. */
    #bar {
      position: sticky; bottom: 0; left: 0; right: 0;
      margin-top: 16px;
      background: #0d1117; border-top: 1.5px solid #222;
      padding: 10px 14px; display: flex; align-items: center; gap: 12px; z-index: 100;
    }
    #bar .status { flex: 1; font-size: 12px; color: #888; }
    #bar .status strong { color: #fff; }
    #create {
      background: #2563eb; color: #fff; border: none; border-radius: 6px;
      padding: 9px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background .15s, opacity .15s;
    }
    #create:disabled { opacity: .4; cursor: not-allowed; }
    #create:not(:disabled):hover { background: #1d4ed8; }

    .empty { color: #555; font-size: 12px; padding: 14px 0; }
  </style>
</head>
<body>
  <div class="section-label">1 · Choose a template</div>
  <div id="templates" class="grid"><p class="empty">Loading templates…</p></div>

  <div class="section-label">2 · Choose a voice</div>
  <div id="voices" class="vgrid"><p class="empty">Loading voices…</p></div>

  <div id="bar">
    <div class="status" id="status">Select a template and a voice to continue.</div>
    <button id="create" disabled>Create Video</button>
  </div>

  <script>
    var R2_BASE = "https://pub-a855a571c7bf4d4d92c266a0e5597a3d.r2.dev/mcp-ui/template-previews/";
    var GENDER_EMOJI = { male: "👨", female: "👩" };

    var data = { templates: [], voices: [], blog_url: "" };
    // ChatGPT (OpenAI Apps SDK) delivers data via window.openai.toolOutput
    // Apply the injected-HTML data first (Claude / direct browser; also
    // ChatGPT's first render on a fresh connector). ChatGPT may cache this
    // resource HTML at the connector level, so the values here can go stale.
    if (window.__B2V_SETUP__) {
      data = Object.assign(data, window.__B2V_SETUP__);
    }
    // Then overlay the fresh tool-call output. setup_video returns the
    // current templates+voices as structuredContent, which ChatGPT exposes
    // here. This wins over the cached __B2V_SETUP__ so the widget always
    // re-renders with the freshest voices on every setup_video invocation.
    if (window.openai && window.openai.toolOutput) {
      data = Object.assign(data, window.openai.toolOutput);
    }

    var selTemplate = null;   // template id
    var selVoice = null;      // voice object
    var curAudio = null, curPlayBtn = null;

    // Pipeline state machine — drives btnEl behaviour across the full
    // create → generate → render → download flow.
    //   idle             → click runs create_project + generation poller
    //   generating       → button disabled while we poll check_generation_status
    //   ready_to_render  → generation done; click runs render_video + render poller
    //   rendering        → button disabled while we poll check_render_status
    //   rendered         → click opens the final MP4 URL in a new tab
    var phase = "idle";
    var pid = null;            // project id, set after create_project succeeds
    var videoUrl = null;       // final MP4 URL, set after render completes

    function cap(s){ return s ? s.charAt(0).toUpperCase()+s.slice(1) : ""; }

    function renderTemplates() {
      var box = document.getElementById("templates");
      if (!data.templates || !data.templates.length) { box.innerHTML = '<p class="empty">No templates.</p>'; return; }
      box.innerHTML = "";
      data.templates.forEach(function(t){
        var id = t.id || t.template || "?";
        var name = t.name || id;
        var genres = (t.genres || []).join(" · ");
        var card = document.createElement("div");
        card.className = "card";
        card.dataset.id = id;
        card.innerHTML =
          '<img src="'+R2_BASE+id+'.png" alt="'+name+'" loading="lazy">' +
          '<div class="info"><h3>'+name+'</h3><div class="genres">'+(genres||"&nbsp;")+'</div></div>';
        card.addEventListener("click", function(){
          if (selTemplate) {
            var prev = box.querySelector('.card[data-id="'+selTemplate+'"]');
            if (prev) prev.classList.remove("selected");
          }
          selTemplate = id;
          card.classList.add("selected");
          updateBar();
        });
        box.appendChild(card);
      });
    }

    function renderVoices() {
      var box = document.getElementById("voices");
      if (!data.voices || !data.voices.length) {
        box.innerHTML = '<p class="empty">No saved voices yet. Add some at ' +
                        '<a href="https://blog2video.app" target="_blank" style="color:#3b82f6;text-decoration:underline;">blog2video.app</a> ' +
                        'and reload this chat.</p>';
        return;
      }
      box.innerHTML = "";
      data.voices.forEach(function(v){
        var labels = v.labels || {};
        var gender = labels.gender || v.gender || "";
        var accent = labels.accent || v.accent || "";
        var name = v.name || v.voice_id || "Voice";
        var emoji = GENDER_EMOJI[gender] || "🎙";
        var card = document.createElement("div");
        card.className = "vcard";
        card.innerHTML =
          '<div class="avatar">'+emoji+'</div>' +
          '<div class="vinfo"><div class="vname">'+name+'</div>' +
          '<div class="vmeta">'+cap(gender)+(accent?" · "+cap(accent):"")+'</div></div>' +
          (v.preview_url ? '<button class="play-btn" title="Preview">▶</button>' : '');
        card.addEventListener("click", function(e){
          if (e.target.closest(".play-btn")) return;
          var prev = box.querySelector(".vcard.selected");
          if (prev) prev.classList.remove("selected");
          selVoice = { voice_id: v.voice_id, name: name, gender: gender, accent: accent };
          card.classList.add("selected");
          updateBar();
        });
        var pb = card.querySelector(".play-btn");
        if (pb) pb.addEventListener("click", function(e){ e.stopPropagation(); togglePlay(pb, v.preview_url); });
        box.appendChild(card);
      });
    }

    function togglePlay(btn, url) {
      if (curAudio) {
        curAudio.pause(); curAudio = null;
        if (curPlayBtn) { curPlayBtn.textContent="▶"; curPlayBtn.classList.remove("playing"); }
        if (curPlayBtn === btn) { curPlayBtn = null; return; }
      }
      var a = new Audio(url); a.play().catch(function(){});
      a.addEventListener("ended", function(){ btn.textContent="▶"; btn.classList.remove("playing"); curAudio=null; curPlayBtn=null; });
      curAudio = a; curPlayBtn = btn; btn.textContent="■"; btn.classList.add("playing");
    }

    function updateBar() {
      var status = document.getElementById("status");
      var btn = document.getElementById("create");
      var parts = [];
      parts.push(selTemplate ? "Template: <strong>"+selTemplate+"</strong>" : "Template: —");
      parts.push(selVoice ? "Voice: <strong>"+selVoice.name+"</strong>" : "Voice: —");
      status.innerHTML = parts.join(" &nbsp;·&nbsp; ");
      btn.disabled = !(selTemplate && selVoice);
    }

    function parseRenderStatus(res) {
      // Prefer structuredContent if surfaced; otherwise regex the markdown.
      try {
        if (res && res.structuredContent && typeof res.structuredContent === "object") {
          return {
            done: !!res.structuredContent.done,
            error: res.structuredContent.error,
            url: res.structuredContent.r2_video_url,
            progress: res.structuredContent.progress,
          };
        }
      } catch (e) { /* ignore */ }
      try {
        if (res && Array.isArray(res.content)) {
          for (var i = 0; i < res.content.length; i++) {
            var c = res.content[i];
            if (!c || typeof c.text !== "string") continue;
            var t = c.text;
            var um = t.match(/https?:\/\/[^\s)]+\.mp4[^\s)]*/i)
                  || t.match(/r2_video_url[^"'\s:]*["':\s]+([^\s"',)]+)/i);
            if (um) return { done: true, url: um[1] || um[0] };
            if (/Render failed/i.test(t)) {
              var em = t.match(/Render failed[^:]*:\s*(.+)$/im);
              return { done: true, error: em ? em[1].trim() : "render failed" };
            }
            var pm = t.match(/(\d{1,3})\s*%/);
            if (pm) return { done: false, progress: parseInt(pm[1], 10) };
          }
        }
      } catch (e) { /* ignore */ }
      return { done: false };
    }

    async function startRenderFlow(btnEl) {
      if (!pid) return;
      btnEl.disabled = true;
      btnEl.style.background = "";          // back to default blue
      btnEl.textContent = "Rendering · starting…";
      phase = "rendering";

      // Fire-and-forget render kickoff (same pattern as generate_video).
      try {
        window.openai.callTool("render_video", { project_id: pid });
      } catch (e) { console.warn("render kickoff failed:", e); }

      var renderAttempts = 0;
      var MAX_RENDER_ATTEMPTS = 96;   // 96 × 5s = 8 min
      var renderHandle = setInterval(async function () {
        renderAttempts++;
        if (renderAttempts > MAX_RENDER_ATTEMPTS) {
          clearInterval(renderHandle);
          btnEl.disabled = false;
          btnEl.textContent = "Still rendering — check chat";
          phase = "ready_to_render";  // let them retry
          return;
        }
        try {
          var statusRes = await window.openai.callTool("check_render_status", { project_id: pid });
          var r = parseRenderStatus(statusRes);
          if (r.done && r.url) {
            clearInterval(renderHandle);
            videoUrl = r.url;
            btnEl.disabled = false;
            btnEl.textContent = "▶ Watch / Download";
            phase = "rendered";
            if (typeof window.openai.sendFollowUpMessage === "function") {
              window.openai.sendFollowUpMessage({
                prompt: "[Blog2Video widget] The MP4 render for project " + pid +
                        " just finished. URL: " + r.url +
                        "\n\nShow this video link to the user (embedded preview if your UI supports it) and ask if they'd like any edits or to render at a different aspect ratio."
              });
            }
          } else if (r.done && r.error) {
            clearInterval(renderHandle);
            btnEl.disabled = false;
            btnEl.textContent = "Failed ✗ — Retry";
            btnEl.style.background = "#dc2626";
            phase = "ready_to_render";  // retry brings them back here
          } else if (typeof r.progress === "number") {
            btnEl.textContent = "Rendering · " + r.progress + "%";
          }
        } catch (e) {
          console.warn("render poll failed:", e);
        }
      }, 5000);
    }

    document.getElementById("create").addEventListener("click", async function(){
      var btnEl = this;

      // Phase dispatch — the click means different things at different stages.
      if (phase === "ready_to_render") { await startRenderFlow(btnEl); return; }
      if (phase === "rendered" && videoUrl) {
        window.open(videoUrl, "_blank", "noopener,noreferrer");
        return;
      }
      if (phase === "generating" || phase === "rendering") return;

      // phase === "idle" or "failed" → run the create + generate flow.
      if (!(selTemplate && selVoice)) return;
      var args = {
        blog_url: data.blog_url || "",
        template: selTemplate,
        voice_gender: selVoice.gender || "female",
        voice_accent: selVoice.accent || "american",
        voice_id: selVoice.voice_id || ""
      };
      btnEl.disabled = true;
      btnEl.textContent = "Creating…";
      phase = "generating";

      function extractProjectId(result) {
        // Try common shapes the MCP tool result might come back as.
        try {
          if (!result) return null;
          if (typeof result === "object" && result.project_id) return result.project_id;
          if (result.structuredContent && result.structuredContent.project_id) return result.structuredContent.project_id;
          if (Array.isArray(result.content)) {
            for (var i = 0; i < result.content.length; i++) {
              var c = result.content[i];
              if (c && typeof c.text === "string") {
                // Match: "project #789", "project_id 789", "project id: 789", "**project #789**"
                var m = c.text.match(/project[_ ]?#?\s*([0-9]+)/i) ||
                        c.text.match(/project[_ ]?id["':\s]*([0-9]+)/i);
                if (m) return parseInt(m[1], 10);
              }
            }
          }
        } catch (e) { /* ignore */ }
        return null;
      }

      function looksLikeError(result) {
        try {
          if (!result) return false;
          if (result.isError) return true;
          if (Array.isArray(result.content)) {
            for (var i = 0; i < result.content.length; i++) {
              var c = result.content[i];
              if (c && typeof c.text === "string" && /^❌|cannot create|missing|error/i.test(c.text)) return true;
            }
          }
        } catch (e) { /* ignore */ }
        return false;
      }

      // ChatGPT (OpenAI Apps SDK)
      if (window.openai && typeof window.openai.callTool === "function") {
        try {
          var result = await window.openai.callTool("create_project", args);
          if (looksLikeError(result)) {
            btnEl.disabled = false;
            btnEl.textContent = "Retry — backend rejected";
            phase = "idle";
            console.warn("create_project returned error:", result);
            if (typeof window.openai.sendFollowUpMessage === "function") {
              window.openai.sendFollowUpMessage({
                prompt: "The create_project tool returned an error. Read the error message, fix the issue (often: ask me for the blog_url and re-call setup_video with it), then retry."
              });
            }
            return;
          }
          pid = extractProjectId(result);
          btnEl.textContent = pid ? ("Created · #" + pid + " · starting…") : "Created ✓";

          // Widget-side polling so the button auto-updates from
          // "generating…" → "Generated ✓" without depending on the model.
          if (pid) {
            // Kick off generation server-side. Fire-and-forget: generate_video
            // blocks on the server until done, but we don't await it here
            // because we manage UI updates via the status poller below.
            try {
              window.openai.callTool("generate_video", { project_id: pid });
            } catch (e) {
              console.warn("generate_video kick-off failed:", e);
            }

            // Surface the project as a tool card in the chat so the model
            // has durable context for follow-ups like "render the video"
            // even if sendFollowUpMessage below is dropped or skipped.
            try {
              window.openai.callTool("get_project", { project_id: pid });
            } catch (e) {
              console.warn("get_project surface failed:", e);
            }

            function parseGenStatus(res) {
              // Prefer structuredContent if the server provides it.
              try {
                if (res && res.structuredContent && typeof res.structuredContent === "object") {
                  return {
                    status: res.structuredContent.status || "",
                    step: res.structuredContent.step,
                    error: res.structuredContent.error,
                  };
                }
              } catch (e) { /* ignore */ }
              // Fallback: scan the markdown text emitted by
              // _humanize_generation_progress() in handlers.py.
              try {
                if (res && Array.isArray(res.content)) {
                  for (var i = 0; i < res.content.length; i++) {
                    var c = res.content[i];
                    if (!c || typeof c.text !== "string") continue;
                    var t = c.text;
                    if (/Generation complete|status['":\s]*generated/i.test(t)) return { status: "generated" };
                    if (/Generation failed|status['":\s]*(failed|error)/i.test(t)) return { status: "failed", error: t };
                    var m = t.match(/Step\s+(\d+)\s*\/\s*4/i);
                    if (m) return { status: "running", step: parseInt(m[1], 10) };
                    if (/Queued/i.test(t)) return { status: "queued" };
                  }
                }
              } catch (e) { /* ignore */ }
              return { status: "" };
            }

            var attempts = 0;
            var MAX_ATTEMPTS = 120; // 120 × 5s = 10 min ceiling
            var pollHandle = setInterval(async function () {
              attempts++;
              if (attempts > MAX_ATTEMPTS) {
                clearInterval(pollHandle);
                btnEl.disabled = false;
                btnEl.textContent = "Still generating — check chat";
                phase = "idle";
                return;
              }
              try {
                var statusRes = await window.openai.callTool("check_generation_status", { project_id: pid });
                var s = parseGenStatus(statusRes);
                if (s.status === "generated" || s.status === "done") {
                  clearInterval(pollHandle);
                  btnEl.disabled = false;
                  btnEl.textContent = "Render Video";
                  btnEl.style.background = "";       // default blue
                  phase = "ready_to_render";
                } else if (s.status === "failed" || s.status === "error" || s.error) {
                  clearInterval(pollHandle);
                  btnEl.disabled = false;
                  btnEl.textContent = "Failed ✗ — Retry";
                  btnEl.style.background = "#dc2626";
                  phase = "idle";                    // retry restarts the whole pipeline
                } else if (typeof s.step === "number" && s.step > 0) {
                  btnEl.textContent = "Created · #" + pid + " · step " + s.step + "/4…";
                }
              } catch (e) {
                // transient — keep polling until MAX_ATTEMPTS
                console.warn("poll failed:", e);
              }
            }, 5000);
          }

          // Strategy: do NOT call generate_video from the widget. callTool
          // results never surface in the chat (they go back to this JS),
          // so the model wouldn't know what happened. Instead, send ONE
          // strong follow-up that makes the model call generate_video and
          // get_project itself — those calls land in the conversation,
          // so the assistant can describe the result to the user.
          if (typeof window.openai.sendFollowUpMessage === "function") {
            var followUp = pid
              ? (
                  "[Blog2Video widget] Project created.\n\n" +
                  "```\nproject_id: " + pid + "\ntemplate: " + args.template +
                  "\nvoice: " + (selVoice.name) + "\n```\n\n" +
                  "Do the following IN ORDER, calling each tool yourself so the user sees progress in chat:\n" +
                  "1. `generate_video(project_id=" + pid + ")` — blocks until generation finishes.\n" +
                  "2. `get_project(project_id=" + pid + ")` — summarise title, scene count, status.\n" +
                  "3. Ask the user if they want to render. On yes, `render_video(project_id=" + pid + ")` " +
                  "then poll `check_render_status` until done; share the URL.\n\n" +
                  "Do not respond in text without calling tools. The project already exists; remember " +
                  "project_id=" + pid + " for the remainder of this conversation."
                )
              : (
                  "[Blog2Video widget] A new project was just created for template '" +
                  args.template + "' / voice '" + (selVoice.name) + "', but the widget " +
                  "couldn't extract the project_id. Call `list_projects`, identify the " +
                  "most recent one, then call `generate_video` on it, then `get_project`."
                );
            window.openai.sendFollowUpMessage({ prompt: followUp });
          }
        } catch (err) {
          btnEl.disabled = false;
          btnEl.textContent = "Retry — error";
          phase = "idle";
          console.error("create_project failed:", err);
        }
      } else {
        // Claude / MCP-UI host — postMessage handshake (host responds out-of-band)
        window.parent.postMessage({ type: "tool", payload: { toolName: "create_project", params: args } }, "*");
        btnEl.textContent = "Sent ✓";
      }
    });

    renderTemplates();
    renderVoices();
    updateBar();
  </script>
</body>
</html>
