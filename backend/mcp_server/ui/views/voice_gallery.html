<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog2Video Voices</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #0a0a0a;
      color: #e8e8e8;
      padding: 14px;
      padding-bottom: 70px;
      min-height: 100vh;
    }

    h1 {
      font-size: 11px;
      font-weight: 500;
      color: #555;
      letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      color: #444;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin: 16px 0 8px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .card {
      background: #141414;
      border-radius: 8px;
      border: 1.5px solid #222;
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
      display: flex;
      align-items: center;
      gap: 10px;
      user-select: none;
    }

    .card:hover { border-color: #444; }

    .card.selected {
      border-color: #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,.3);
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #1e1e1e;
      border: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .info { flex: 1; min-width: 0; }

    .name {
      font-size: 12px;
      font-weight: 600;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta {
      font-size: 10px;
      color: #555;
      margin-top: 2px;
    }

    .badges { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }

    .badge {
      font-size: 9px;
      font-weight: 500;
      padding: 1px 5px;
      border-radius: 3px;
      letter-spacing: .03em;
    }

    .badge-accent { background: #1a2a1a; color: #4ade80; border: 1px solid #2a4a2a; }
    .badge-gender { background: #1a1a2a; color: #818cf8; border: 1px solid #2a2a4a; }
    .badge-pro    { background: #2a1a0a; color: #fb923c; border: 1px solid #4a2a0a; }
    .badge-free   { background: #0f1a0f; color: #4ade80; border: 1px solid #1a3a1a; }

    .play-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #1e1e1e;
      border: 1px solid #333;
      color: #888;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s, color .15s, border-color .15s;
    }

    .play-btn:hover { background: #252525; color: #ddd; border-color: #555; }
    .play-btn.playing { background: #1e3a5f; color: #3b82f6; border-color: #3b82f6; }

    /* Bottom selection bar */
    #sel-bar {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #0d1f3c;
      border-top: 1.5px solid #3b82f6;
      padding: 10px 14px;
      align-items: center;
      gap: 10px;
      z-index: 100;
    }

    #sel-bar.visible { display: flex; }

    #sel-bar .check {
      width: 20px; height: 20px;
      background: #3b82f6;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; flex-shrink: 0;
    }

    #sel-bar .label { font-size: 12px; color: #aaa; flex: 1; }
    #sel-bar .label strong { color: #fff; }

    #sel-bar .cmd {
      font-family: "SF Mono", ui-monospace, monospace;
      font-size: 11px;
      color: #3b82f6;
      background: #0f1929;
      border: 1px solid #1e3a5f;
      border-radius: 4px;
      padding: 3px 8px;
    }

    #copied-toast {
      display: none;
      position: fixed;
      top: 10px; left: 50%; transform: translateX(-50%);
      background: #1e3a5f;
      border: 1px solid #3b82f6;
      color: #93c5fd;
      font-size: 11px;
      border-radius: 6px;
      padding: 5px 12px;
      z-index: 200;
    }

    .empty { color: #555; font-size: 12px; padding: 20px 0; }
  </style>
</head>
<body>
  <h1>Blog2Video Voices &mdash; click to select</h1>

  <div id="root"><p class="empty">Loading voices…</p></div>

  <div id="sel-bar">
    <div class="check">✓</div>
    <div class="label">Selected: <strong id="sel-name"></strong></div>
    <span class="cmd" id="sel-cmd"></span>
  </div>

  <div id="copied-toast">Copied to clipboard!</div>

  <script>
    var voices = (typeof window.__B2V_VOICES__ !== 'undefined') ? window.__B2V_VOICES__ : [];
    var currentCard = null;
    var currentAudio = null;
    var currentPlayBtn = null;
    var bar = document.getElementById('sel-bar');
    var toast = document.getElementById('copied-toast');
    var root = document.getElementById('root');

    var GENDER_EMOJI = { male: '👨', female: '👩' };

    function cap(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

    function render() {
      if (!voices || voices.length === 0) {
        root.innerHTML = '<p class="empty">No voices available.</p>';
        return;
      }

      var free = voices.filter(function(v) { return (v.plan || 'free') === 'free'; });
      var pro  = voices.filter(function(v) { return (v.plan || 'free') !== 'free'; });

      var html = '';

      if (free.length) {
        html += '<div class="section-label">Free voices</div><div class="grid" id="free-grid">';
        free.forEach(function(v) { html += cardHTML(v); });
        html += '</div>';
      }

      if (pro.length) {
        html += '<div class="section-label">Pro voices</div><div class="grid" id="pro-grid">';
        pro.forEach(function(v) { html += cardHTML(v); });
        html += '</div>';
      }

      root.innerHTML = html;

      // Attach events
      root.querySelectorAll('.card').forEach(function(card) {
        card.addEventListener('click', function(e) {
          if (e.target.closest('.play-btn')) return; // handled separately
          selectCard(card);
        });
      });

      root.querySelectorAll('.play-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          togglePlay(btn);
        });
      });
    }

    function cardHTML(v) {
      var labels = v.labels || {};
      var name = v.name || v.voice_id || 'Unknown';
      var gender = labels.gender || '';
      var accent = labels.accent || '';
      var plan = v.plan || 'free';
      var preview = v.preview_url || '';
      var emoji = GENDER_EMOJI[gender] || '🎙';
      var vid = encodeURIComponent(v.voice_id || name);
      var genderStr = cap(gender);
      var accentStr = cap(accent);

      return [
        '<div class="card" ',
        'data-id="', (v.voice_id || name), '" ',
        'data-name="', name, '" ',
        'data-gender="', gender, '" ',
        'data-accent="', accent, '">',
        '<div class="avatar">', emoji, '</div>',
        '<div class="info">',
        '<div class="name">', name, '</div>',
        '<div class="meta">', genderStr, (accentStr ? ' &middot; ' + accentStr : ''), '</div>',
        '<div class="badges">',
        (gender  ? '<span class="badge badge-gender">' + genderStr  + '</span>' : ''),
        (accent  ? '<span class="badge badge-accent">' + accentStr  + '</span>' : ''),
        (plan !== 'free' ? '<span class="badge badge-pro">Pro</span>' : '<span class="badge badge-free">Free</span>'),
        '</div>',
        '</div>',
        (preview ? '<button class="play-btn" data-preview="' + preview + '" title="Preview">▶</button>' : ''),
        '</div>'
      ].join('');
    }

    function selectCard(card) {
      if (currentCard) currentCard.classList.remove('selected');
      currentCard = card;
      card.classList.add('selected');

      var name   = card.dataset.name;
      var gender = card.dataset.gender;
      var accent = card.dataset.accent;
      var cmd    = 'use voice: ' + name + (gender ? ', ' + gender : '') + (accent ? ', ' + accent : '');

      document.getElementById('sel-name').textContent = name + (gender ? ' (' + cap(gender) + ', ' + cap(accent) + ')' : '');
      document.getElementById('sel-cmd').textContent  = cmd;
      bar.classList.add('visible');

      try {
        navigator.clipboard.writeText(cmd).then(function() {
          toast.style.display = 'block';
          setTimeout(function() { toast.style.display = 'none'; }, 1800);
        });
      } catch(e) {}

      try {
        window.parent.postMessage({ type: 'voice-selected', name: name, gender: gender, accent: accent, cmd: cmd }, '*');
      } catch(e) {}
    }

    function togglePlay(btn) {
      var url = btn.dataset.preview;
      if (!url) return;

      // Stop current
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
        if (currentPlayBtn) { currentPlayBtn.textContent = '▶'; currentPlayBtn.classList.remove('playing'); }
        if (currentPlayBtn === btn) { currentPlayBtn = null; return; }
      }

      // Play new
      var audio = new Audio(url);
      audio.play().catch(function() {});
      audio.addEventListener('ended', function() {
        btn.textContent = '▶';
        btn.classList.remove('playing');
        currentAudio = null;
        currentPlayBtn = null;
      });
      currentAudio = audio;
      currentPlayBtn = btn;
      btn.textContent = '■';
      btn.classList.add('playing');
    }

    render();
  </script>
</body>
</html>
