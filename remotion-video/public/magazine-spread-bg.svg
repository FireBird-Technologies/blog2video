<svg viewBox="0 0 1290 890" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Blank open magazine spread with a center crease and lifted page corners</title>
<desc>Two blank crisp white paper pages forming an open spread with a shadowed center crease and slightly lifted, curled outer corners for a more physical paper feel. No text or images.</desc>
<defs>
<linearGradient id="creaseL4" x1="1" y1="0" x2="0" y2="0">
  <stop offset="0" stop-color="#000000" stop-opacity="0.24"/>
  <stop offset="1" stop-color="#000000" stop-opacity="0"/>
</linearGradient>
<linearGradient id="creaseR4" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0" stop-color="#000000" stop-opacity="0.24"/>
  <stop offset="1" stop-color="#000000" stop-opacity="0"/>
</linearGradient>
<linearGradient id="edgeL4" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0" stop-color="#000000" stop-opacity="0.10"/>
  <stop offset="1" stop-color="#000000" stop-opacity="0"/>
</linearGradient>
<linearGradient id="edgeR4" x1="1" y1="0" x2="0" y2="0">
  <stop offset="0" stop-color="#000000" stop-opacity="0.10"/>
  <stop offset="1" stop-color="#000000" stop-opacity="0"/>
</linearGradient>
<filter id="pageShadow4" x="-20%" y="-20%" width="140%" height="140%">
  <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000000" flood-opacity="0.22"/>
</filter>
</defs>

<rect x="0" y="0" width="1280" height="880" fill="#ffffff"/>

<g filter="url(#pageShadow4)">
  <path d="M30 40 Q30 20 50 20 L610 20 Q630 20 630 40 L630 820 Q630 840 610 840 L50 840 Q30 840 30 820 Z" fill="#fefefe"/>
  <path d="M650 20 L1210 20 Q1230 20 1230 40 L1230 820 Q1230 840 1210 840 L670 840 Q650 840 650 820 Z" fill="#fefefe"/>
</g>

<rect x="600" y="20" width="30" height="820" fill="url(#creaseL4)"/>
<rect x="30" y="20" width="26" height="820" fill="url(#edgeL4)"/>
<rect x="650" y="20" width="30" height="820" fill="url(#creaseR4)"/>
<rect x="1224" y="20" width="26" height="820" fill="url(#edgeR4)"/>

<rect x="638" y="20" width="4" height="820" fill="#000000" opacity="0.28"/>
</svg>
